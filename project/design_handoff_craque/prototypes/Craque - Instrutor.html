<!-- ── MOBILE PRIMITIVES ──────────────────────────────────── -->
<script type="text/babel">
const NAVY='var(--navy-900)', ACC='var(--accent)', INK='var(--text-primary)', INK2='var(--text-secondary)';

function Cta({children, icon, variant='primary', onClick, style}) {
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':2}}); });
  const base={width:'100%',height:52,borderRadius:14,fontFamily:'var(--font-ui)',fontSize:16,fontWeight:'var(--fw-bold)',display:'flex',alignItems:'center',justifyContent:'center',gap:8,cursor:'pointer',border:'none',whiteSpace:'nowrap',transition:'filter .15s'};
  const styles={
    primary:{background:ACC,color:NAVY},
    ghost:{background:'var(--surface-card)',color:INK,border:'1px solid var(--border-default)'},
    wa:{background:'#25D366',color:'#fff'},
    danger:{background:'var(--surface-card)',color:'var(--danger)',border:'1px solid var(--border-default)'},
  };
  return <button onClick={onClick} style={{...base,...styles[variant],...style}}>{icon&&<i data-lucide={icon} width="18" height="18"></i>}{children}</button>;
}
window.Cta=Cta;

function MCard({children, dark, style, onClick}) {
  return <div onClick={onClick} style={{background:dark?NAVY:'var(--surface-card)',color:dark?'#fff':INK,border:dark?'none':'1px solid var(--border-subtle)',borderRadius:18,padding:18,boxShadow:dark?'none':'var(--shadow-card)',position:dark?'relative':'static',overflow:dark?'hidden':'visible',...style}}>{children}</div>;
}
window.MCard=MCard;

function KV({k, v, strong, last}) {
  return <div style={{display:'flex',justifyContent:'space-between',gap:12,padding:'11px 0',borderBottom:last?'none':'1px solid var(--border-subtle)',fontSize:14}}>
    <span style={{color:INK2}}>{k}</span><strong style={{textAlign:'right',color:strong||INK}}>{v}</strong>
  </div>;
}
window.KV=KV;

function Seg({tabs, value, onChange}) {
  return <div style={{display:'flex',background:'var(--surface-muted)',borderRadius:13,padding:4,gap:4,marginBottom:16}}>
    {tabs.map(([v,l])=>(<button key={v} onClick={()=>onChange(v)} style={{flex:1,textAlign:'center',padding:'9px 6px',borderRadius:9,fontSize:13.5,fontWeight:'var(--fw-bold)',fontFamily:'var(--font-ui)',border:'none',cursor:'pointer',background:value===v?'var(--surface-card)':'transparent',color:value===v?INK:INK2,boxShadow:value===v?'var(--shadow-sm)':'none'}}>{l}</button>))}
  </div>;
}
window.Seg=Seg;

function Toggle({on, onClick}) {
  return <div onClick={onClick} style={{width:42,height:24,borderRadius:99,background:on?ACC:'var(--gray-300)',cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}}>
    <span style={{position:'absolute',top:3,left:on?21:3,width:18,height:18,borderRadius:'50%',background:'#fff',transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.25)'}}/>
  </div>;
}
window.Toggle=Toggle;

function TRow({label, sub, defaultOn=true, last}) {
  const [on,setOn]=React.useState(defaultOn);
  return <div style={{display:'flex',alignItems:'center',gap:14,padding:'13px 0',borderBottom:last?'none':'1px solid var(--border-subtle)'}}>
    <div style={{flex:1}}><div style={{fontWeight:'var(--fw-semibold)',fontSize:14}}>{label}</div>{sub&&<div style={{fontSize:'var(--fs-xs)',color:INK2,marginTop:2}}>{sub}</div>}</div>
    <Toggle on={on} onClick={()=>setOn(!on)}/>
  </div>;
}
window.TRow=TRow;

function Field({label, value}) {
  const [focus,setFocus]=React.useState(false);
  return <div style={{display:'flex',flexDirection:'column',gap:7}}>
    <label style={{fontSize:13,fontWeight:'var(--fw-semibold)',color:INK}}>{label}</label>
    <input defaultValue={value} onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)} style={{height:48,padding:'0 15px',border:`1px solid ${focus?ACC:'var(--border-default)'}`,borderRadius:12,background:'var(--surface-card)',fontFamily:'var(--font-ui)',fontSize:15,color:INK,outline:'none',boxShadow:focus?'0 0 0 3px var(--accent-tint)':'none',transition:'all .14s'}}/>
  </div>;
}
window.Field=Field;

function Note({children}) {
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.9}}); });
  return <div style={{padding:'13px 14px',background:'var(--info-tint)',borderRadius:12,borderLeft:'3px solid var(--info)',display:'flex',gap:9,alignItems:'flex-start'}}>
    <i data-lucide="info" width="15" height="15" style={{color:'var(--info)',flexShrink:0,marginTop:1}}></i>
    <p style={{margin:0,fontSize:13,color:INK2,lineHeight:1.6}}>{children}</p>
  </div>;
}
window.Note=Note;

function ListRow({icon, label, sub, onClick, last}) {
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.8}}); });
  return <div onClick={onClick} style={{display:'flex',alignItems:'center',gap:13,padding:'13px 0',borderBottom:last?'none':'1px solid var(--border-subtle)',cursor:'pointer'}}>
    <span style={{width:40,height:40,borderRadius:11,background:'var(--surface-muted)',display:'grid',placeItems:'center',flexShrink:0}}><i data-lucide={icon} width="19" height="19" style={{color:INK2}}></i></span>
    <div style={{flex:1,minWidth:0}}><div style={{fontWeight:'var(--fw-semibold)',fontSize:15}}>{label}</div>{sub&&<div style={{fontSize:'var(--fs-xs)',color:INK2,marginTop:1}}>{sub}</div>}</div>
    <i data-lucide="chevron-right" width="18" height="18" style={{color:'var(--gray-500)',flexShrink:0}}></i>
  </div>;
}
window.ListRow=ListRow;

function MiniStat({icon, val, label, tint, ink}) {
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.9}}); });
  return <div style={{flex:1,background:tint,border:'1px solid var(--border-subtle)',borderRadius:16,padding:'14px 10px',textAlign:'center'}}>
    <i data-lucide={icon} width="22" height="22" style={{color:ink,display:'block',margin:'0 auto 6px'}}></i>
    <div style={{fontSize:24,fontWeight:'var(--fw-bold)',color:ink,lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{val}</div>
    <div style={{fontSize:'var(--fs-xs)',color:INK2,marginTop:4}}>{label}</div>
  </div>;
}
window.MiniStat=MiniStat;
</script>

<!-- ── SCREENS: HOME & ATTENDANCE ─────────────────────────── -->
<script type="text/babel">
function ScrLogin({nav}) {
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.9}}); });
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',padding:'70px 22px 30px',boxSizing:'border-box',background:'var(--surface-canvas)'}}>
      <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',textAlign:'center',gap:12}}>
        <span style={{width:66,height:66,borderRadius:19,background:NAVY,display:'grid',placeItems:'center'}}><i data-lucide="clipboard-list" width="32" height="32" style={{color:ACC}}></i></span>
        <div><div style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:26,lineHeight:1}}>Craque</div>
        <div style={{fontSize:14,color:INK2,marginTop:4}}>Área do instrutor</div></div>
        <div style={{fontSize:21,fontWeight:'var(--fw-bold)',lineHeight:1.3,maxWidth:280,marginTop:16}}>Chamada, turmas e comunicados em um só lugar.</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Field label="E-mail" value="voce@email.com"/>
        <Field label="Senha" value="••••••••"/>
        <Cta icon="log-in" onClick={()=>nav('home')} style={{marginTop:4}}>Entrar</Cta>
        <Note>Seu acesso é criado pela <strong>escolinha</strong>. Verifique o convite no seu e-mail ou WhatsApp.</Note>
      </div>
    </div>
  );
}
window.ScrLogin=ScrLogin;

function ScrHome({nav}) {
  const {Badge}=window.CampoFootballSchoolManagementDesignSystem_a7c81e;
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.9}}); });
  const turmas=[['Sub-7','Seg e Qua · 17h','12 alunos'],['Sub-9','Ter e Qui · 18h','14 alunos'],['Sub-15','Sex · 19h','12 alunos']];
  const qa=[['clipboard-check','Chamada','chamada'],['users','Alunos','alunos'],['calendar','Calendário','calendario'],['megaphone','Comunicados','comunicados']];
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 0 16px'}}>
        <div><div style={{fontSize:20,fontWeight:'var(--fw-bold)'}}>Olá, João! 👋</div><div style={{fontSize:'var(--fs-xs)',color:INK2,marginTop:1}}>Quarta-feira, 25 abr</div></div>
        <button style={{width:38,height:38,borderRadius:'50%',border:'1px solid var(--border-subtle)',background:'var(--surface-card)',display:'grid',placeItems:'center',cursor:'pointer',position:'relative'}}>
          <i data-lucide="bell" width="18" height="18" style={{color:INK2}}></i>
          <span style={{position:'absolute',top:6,right:7,width:8,height:8,borderRadius:'50%',background:'var(--danger)',border:'2px solid var(--surface-card)'}}/>
        </button>
      </div>
      <MCard dark style={{marginBottom:18,display:'flex',gap:12,alignItems:'center'}}>
        <span style={{width:52,height:52,borderRadius:14,background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',display:'grid',placeItems:'center',flexShrink:0}}><i data-lucide="shield" width="26" height="26" style={{color:'rgba(255,255,255,.85)'}}></i></span>
        <div><div style={{fontSize:17,fontWeight:'var(--fw-bold)'}}>FC Estrela</div><div style={{fontSize:13,color:'rgba(255,255,255,.6)'}}>Treinador Auxiliar</div></div>
      </MCard>
      <div style={{fontWeight:'var(--fw-bold)',fontSize:15,margin:'0 2px 10px'}}>Suas turmas</div>
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        <MiniStat icon="goal" val="3" label="Turmas ativas" tint="var(--surface-muted)" ink={INK}/>
        <MiniStat icon="users" val="38" label="Total de alunos" tint="var(--accent-tint)" ink="var(--success)"/>
        <MiniStat icon="calendar-check" val="1" label="Treino hoje" tint="var(--warning-tint)" ink="var(--warning)"/>
      </div>
      <MCard style={{padding:'4px 16px',marginBottom:18}}>
        {turmas.map((t,i)=>(
          <div key={t[0]} onClick={()=>nav('turmas')} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 0',borderBottom:i<turmas.length-1?'1px solid var(--border-subtle)':'none',cursor:'pointer'}}>
            <span style={{width:40,height:40,borderRadius:11,background:'var(--surface-muted)',display:'grid',placeItems:'center',flexShrink:0}}><i data-lucide="goal" width="19" height="19" style={{color:INK2}}></i></span>
            <div style={{flex:1}}><div style={{fontWeight:'var(--fw-bold)',fontSize:15}}>{t[0]}</div><div style={{fontSize:'var(--fs-xs)',color:INK2,marginTop:1}}>{t[1]}</div></div>
            <Badge tone="neutral">{t[2]}</Badge>
            <i data-lucide="chevron-right" width="16" height="16" style={{color:'var(--gray-500)'}}></i>
          </div>
        ))}
      </MCard>
      <div style={{fontWeight:'var(--fw-bold)',fontSize:15,margin:'0 2px 10px'}}>Ações rápidas</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {qa.map(([ico,l,go])=>(
          <MCard key={l} style={{textAlign:'center',cursor:'pointer',padding:'18px 8px'}} onClick={()=>nav(go)}>
            <span style={{width:46,height:46,borderRadius:13,background:'var(--surface-muted)',display:'inline-grid',placeItems:'center',marginBottom:8}}><i data-lucide={ico} width="22" height="22" style={{color:INK2}}></i></span>
            <div style={{fontSize:13,fontWeight:'var(--fw-bold)'}}>{l}</div>
          </MCard>
        ))}
      </div>
    </div>
  );
}
window.ScrHome=ScrHome;

function ScrChamada({nav}) {
  const {Avatar}=window.CampoFootballSchoolManagementDesignSystem_a7c81e;
  const roster=[['Gabriel Silva','A-031','ok'],['Larissa Oliveira','A-032','ok'],['Miguel Lima','A-033','bad'],['Beatriz Santos','A-034','ok'],['Rafael Alves','A-035','bad'],['Caio Ferreira','A-036',''],['Julia Pinto','A-037','']];
  const [marks,setMarks]=React.useState(roster.map(r=>r[2]));
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':2}}); });
  const set=(i,v)=>setMarks(m=>m.map((x,j)=>j===i?v:x));
  const pres=marks.filter(m=>m==='ok').length, falt=marks.filter(m=>m==='bad').length, pend=marks.filter(m=>!m).length;
  const counter=(val,label,bg,col)=>(<div style={{flex:1,textAlign:'center',padding:'10px',background:bg,borderRadius:12}}><div style={{fontSize:20,fontWeight:'var(--fw-bold)',color:col}}>{val}</div><div style={{fontSize:11,color:INK2,marginTop:2}}>{label}</div></div>);
  const btn=(active,tone)=>{
    const map={ok:{bg:'var(--accent-tint)',bd:'var(--success)',c:'var(--success)'},bad:{bg:'var(--danger-tint)',bd:'var(--danger)',c:'var(--danger)'}};
    const a=map[tone];
    return {height:34,padding:'0 11px',borderRadius:9,border:`1px solid ${active?a.bd:'var(--border-default)'}`,background:active?a.bg:'var(--surface-card)',color:active?a.c:'var(--gray-500)',fontSize:12,fontWeight:'var(--fw-bold)',cursor:'pointer',fontFamily:'var(--font-ui)',display:'flex',alignItems:'center',gap:4};
  };
  return (
    <div>
      <MCard style={{marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingBottom:12,marginBottom:12,borderBottom:'1px solid var(--border-subtle)'}}>
          <span style={{fontWeight:'var(--fw-bold)'}}>Turma</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}><span style={{fontWeight:'var(--fw-bold)'}}>Sub-9</span><i data-lucide="chevron-down" width="16" height="16" style={{color:'var(--gray-500)'}}></i></div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontWeight:'var(--fw-bold)'}}>Data</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}><span style={{fontWeight:'var(--fw-bold)'}}>25 abr 2026 · 18h00</span><i data-lucide="calendar" width="16" height="16" style={{color:'var(--gray-500)'}}></i></div>
        </div>
      </MCard>
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        {counter(pres,'Presentes','var(--accent-tint)','var(--success)')}
        {counter(falt,'Faltas','var(--danger-tint)','var(--danger)')}
        {counter(pend,'Pendentes','var(--surface-muted)',INK2)}
      </div>
      <MCard style={{padding:'0 16px',marginBottom:16}}>
        {roster.map((r,i)=>(
          <div key={r[1]} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 0',borderBottom:i<roster.length-1?'1px solid var(--border-subtle)':'none'}}>
            <Avatar name={r[0]} size={40}/>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:'var(--fw-bold)',fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r[0]}</div><div style={{fontSize:'var(--fs-xs)',color:INK2}}>#{r[1]}</div></div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>set(i,'ok')} style={btn(marks[i]==='ok','ok')}><i data-lucide="check" width="13" height="13"></i>Presente</button>
              <button onClick={()=>set(i,'bad')} style={btn(marks[i]==='bad','bad')}><i data-lucide="x" width="13" height="13"></i>Falta</button>
            </div>
          </div>
        ))}
      </MCard>
      <Cta icon="check-circle" onClick={()=>nav('chamada-ok')}>Confirmar chamada</Cta>
      <div style={{marginTop:14}}><Note>A chamada fica registrada no histórico da turma e os responsáveis podem ser notificados sobre faltas.</Note></div>
    </div>
  );
}
window.ScrChamada=ScrChamada;

function ScrChamadaOk({nav}) {
  const {Avatar,Badge}=window.CampoFootballSchoolManagementDesignSystem_a7c81e;
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':2}}); });
  const faltas=[['Miguel Lima'],['Rafael Alves'],['Caio Ferreira']];
  return (
    <div>
      <div style={{textAlign:'center',padding:'18px 0 14px'}}>

        <div style={{fontWeight:'var(--fw-bold)',fontSize:21,marginTop:14}}>Chamada registrada!</div>
        <div style={{fontSize:'var(--fs-sm)',color:INK2}}>Sub-9 · 25 abr 2026 · 18h02</div>
      </div>
      <MCard style={{marginBottom:14}}>
        <KV k="Turma" v="Sub-9"/><KV k="Total de alunos" v="14"/>
        <KV k="Presentes" v="11" strong="var(--success)"/><KV k="Faltas" v="3" strong="var(--danger)"/>
        <KV k="Taxa de presença" v="78,6%" last/>
      </MCard>
      <div style={{fontWeight:'var(--fw-bold)',fontSize:15,margin:'8px 2px 10px'}}>Alunos com falta</div>
      <MCard style={{padding:'4px 16px',marginBottom:16}}>
        {faltas.map((f,i)=>(
          <div key={f[0]} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 0',borderBottom:i<faltas.length-1?'1px solid var(--border-subtle)':'none'}}>
            <Avatar name={f[0]} size={36}/>
            <div style={{flex:1,fontWeight:'var(--fw-bold)',fontSize:14}}>{f[0]}</div>
            <Badge tone="danger" dot>Falta</Badge>
          </div>
        ))}
      </MCard>
      <Cta variant="ghost" icon="bell" style={{marginBottom:10}}>Notificar responsáveis</Cta>
      <Cta icon="layout-dashboard" onClick={()=>nav('home')}>Voltar ao início</Cta>
    </div>
  );
}
window.ScrChamadaOk=ScrChamadaOk;
</script>

<!-- ── SCREENS: TURMAS, ALUNOS, CALENDÁRIO ────────────────── -->
<script type="text/babel">
const PB={ok:{tone:'success'},warn:{tone:'warning'},bad:{tone:'danger'}};

function ScrTurmas({nav}) {
  const {Badge}=window.CampoFootballSchoolManagementDesignSystem_a7c81e;
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.9}}); });
  const turmas=[['var(--navy-900)','Sub-7','6 a 7 anos','Seg e Qua · 17h–18h30',12],['#2A6FDB','Sub-9','8 a 9 anos','Ter e Qui · 18h–19h30',14],['var(--success)','Sub-15','14 a 15 anos','Sex · 19h–20h30',12]];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {turmas.map(t=>(
        <MCard key={t[1]} style={{cursor:'pointer'}} onClick={()=>nav('turma')}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{width:44,height:44,borderRadius:12,background:t[0],display:'grid',placeItems:'center',flexShrink:0}}><i data-lucide="goal" width="22" height="22" style={{color:'#fff'}}></i></span>
            <div style={{flex:1}}><div style={{fontWeight:'var(--fw-bold)',fontSize:16}}>{t[1]}</div><div style={{fontSize:'var(--fs-xs)',color:INK2,marginTop:1}}>{t[2]}</div></div>
            <Badge tone="neutral">{t[4]} alunos</Badge>
            <i data-lucide="chevron-right" width="18" height="18" style={{color:'var(--gray-500)'}}></i>
          </div>
          <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border-subtle)',display:'flex',gap:6,alignItems:'center',color:INK2,fontSize:13}}><i data-lucide="calendar" width="14" height="14"></i>{t[3]}</div>
        </MCard>
      ))}
      <Note>Turmas atribuídas pela escolinha. Fale com a administração para ajustes.</Note>
    </div>
  );
}
window.ScrTurmas=ScrTurmas;

function ScrTurma({nav}) {

        <Field label="Confirmar nova senha" value="••••••••"/>
      </div>
      <Cta icon="check" onClick={()=>nav('perfil')} style={{marginTop:6}}>Salvar alterações</Cta>
    </div>
  );
}
window.ScrMeusDados=ScrMeusDados;

function ScrNotif({nav}) {
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.9}}); });
  return (
    <div>
      <div style={{fontWeight:'var(--fw-bold)',fontSize:15,margin:'0 2px 10px'}}>Chamada</div>
      <MCard style={{marginBottom:14,padding:'2px 16px'}}>
        <TRow label="Lembrete antes do treino" sub="30 min antes do horário"/>
        <TRow label="Chamada não realizada" sub="Alerta se não houver chamada" last/>
      </MCard>
      <div style={{fontWeight:'var(--fw-bold)',fontSize:15,margin:'0 2px 10px'}}>Comunicados</div>
      <MCard style={{marginBottom:14,padding:'2px 16px'}}>
        <TRow label="Novos comunicados" sub="Da administração e coordenação"/>
        <TRow label="Respostas aos meus envios" last/>
      </MCard>
      <div style={{fontWeight:'var(--fw-bold)',fontSize:15,margin:'0 2px 10px'}}>Canais</div>
      <MCard style={{marginBottom:16,padding:'2px 16px'}}>
        <TRow label="Push (notificação no celular)"/>
        <TRow label="E-mail" defaultOn={false} last/>
      </MCard>
      <Cta icon="check" onClick={()=>nav('perfil')}>Salvar preferências</Cta>
    </div>
  );
}
window.ScrNotif=ScrNotif;

function ScrAjuda({nav}) {
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.9}}); });
  const items=[['clipboard-check','Como fazer a chamada?','Passo a passo para registrar presença'],['calendar-x','Editar uma chamada já feita','Corrija registros de datas anteriores'],['send','Enviar comunicado','Mande recados para a administração'],['users','Aluno não aparece na turma','Matrícula e sincronização'],['phone','Falar com a coordenação','Contatos da escolinha']];
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {items.map(c=>(
        <MCard key={c[1]} style={{cursor:'pointer',display:'flex',gap:12,alignItems:'center'}}>
          <span style={{width:40,height:40,borderRadius:11,background:'var(--surface-muted)',display:'grid',placeItems:'center',flexShrink:0}}><i data-lucide={c[0]} width="19" height="19" style={{color:INK2}}></i></span>
          <div style={{flex:1}}><div style={{fontWeight:'var(--fw-bold)',fontSize:15}}>{c[1]}</div><div style={{fontSize:'var(--fs-xs)',color:INK2,marginTop:1}}>{c[2]}</div></div>
          <i data-lucide="chevron-right" width="16" height="16" style={{color:'var(--gray-500)'}}></i>
        </MCard>
      ))}
      <div style={{borderTop:'1px solid var(--border-subtle)',paddingTop:14,textAlign:'center'}}>
        <div style={{fontSize:'var(--fs-xs)',color:INK2,marginBottom:10}}>Precisa de mais ajuda?</div>
        <Cta variant="wa" icon="message-circle">Falar com a escolinha</Cta>
      </div>
    </div>
  );
}
window.ScrAjuda=ScrAjuda;
</script>

<!-- ── APP SHELL ──────────────────────────────────────────── -->
<script type="text/babel">
const TABS=[['home','Início','layout-dashboard'],['chamada','Chamada','clipboard-check'],['perfil','Perfil','user']];
const META={
  home:        {title:null,                    chrome:'app',  tab:'home'},
  turmas:      {title:'Minhas turmas',         chrome:'app',  tab:'home'},
  turma:       {title:'Sub-9',                 chrome:'app',  tab:'home', back:'turmas'},
  alunos:      {title:'Alunos',                chrome:'app',  tab:'home'},
  aluno:       {title:'Gabriel Silva',         chrome:'focus',back:'alunos'},
  chamada:     {title:'Chamada',               chrome:'focus',back:'home'},
  'chamada-ok':{title:'Chamada confirmada',    chrome:'focus',back:'home'},
  calendario:  {title:'Calendário',            chrome:'app',  tab:'home'},
  comunicados: {title:'Comunicados',           chrome:'app',  tab:'home'},
  comunicado:  {title:'Comunicado',            chrome:'focus',back:'comunicados'},
  perfil:      {title:'Perfil',                chrome:'app',  tab:'perfil'},
  'meus-dados-inst':{title:'Meus dados',       chrome:'focus',back:'perfil'},
  'notif-inst':{title:'Notificações',          chrome:'focus',back:'perfil'},
  'ajuda-inst':{title:'Central de ajuda',      chrome:'focus',back:'perfil'},
};
const SCR={
  home:window.ScrHome, turmas:window.ScrTurmas, turma:window.ScrTurma, alunos:window.ScrAlunos,
  aluno:window.ScrAluno, chamada:window.ScrChamada, 'chamada-ok':window.ScrChamadaOk,
  calendario:window.ScrCalendario, comunicados:window.ScrComunicados, comunicado:window.ScrComunicado,
  perfil:window.ScrPerfil, 'meus-dados-inst':window.ScrMeusDados, 'notif-inst':window.ScrNotif, 'ajuda-inst':window.ScrAjuda,
};

function Header({meta, nav}) {
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.9}}); });
  const btn={width:38,height:38,borderRadius:11,border:'1px solid var(--border-subtle)',background:'var(--surface-card)',display:'grid',placeItems:'center',cursor:'pointer',flexShrink:0};
  return <div style={{display:'flex',alignItems:'center',gap:8,padding:'52px 16px 10px',flexShrink:0,background:'var(--surface-canvas)'}}>
    {meta.back?<button onClick={()=>nav(meta.back)} style={btn}><i data-lucide="arrow-left" width="19" height="19" style={{color:INK2}}></i></button>:<span style={{width:38}}/>}
    <div style={{flex:1,textAlign:'center',fontSize:17,fontWeight:'var(--fw-bold)'}}>{meta.title}</div>
    <span style={{width:38}}/>
  </div>;
}

function TabBar({active, nav}) {
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.9}}); });
  return <div style={{display:'flex',alignItems:'center',borderTop:'1px solid var(--border-subtle)',background:'var(--surface-card)',padding:'8px 10px 26px',gap:4}}>
    {TABS.map(([k,l,ico])=>{const on=k===active;
      return (
        <button key={k} onClick={()=>nav(k)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'none',border:'none',cursor:'pointer',color:on?'var(--success)':'var(--gray-500)',fontFamily:'var(--font-ui)',fontSize:11,fontWeight:'var(--fw-bold)'}}>
          <i data-lucide={ico} width="22" height="22"></i>{l}
        </button>);
    })}
  </div>;
}

function InstApp() {
  const [view,setView]=React.useState('login');
  const nav=React.useCallback(v=>setView(v),[]);
  React.useEffect(()=>{ window.lucide?.createIcons({attrs:{'stroke-width':1.9}}); });
  const meta=META[view];
  const Screen=SCR[view];
  return (
    <IOSDevice>
      {view==='login'
        ? <window.ScrLogin nav={nav}/>
        : <div style={{height:'100%',display:'flex',flexDirection:'column',background:'var(--surface-canvas)'}}>
            <Header meta={meta} nav={nav}/>
            <div style={{flex:1,overflowY:'auto',padding:'6px 16px 22px'}} key={view}>
              {Screen?<Screen nav={nav}/>:<div style={{padding:40,textAlign:'center',color:INK2}}>Em construção</div>}
            </div>
            {meta.chrome==='app'&&<TabBar active={meta.tab} nav={nav}/>}
          </div>}
    </IOSDevice>
  );
}
window.InstApp=InstApp;
ReactDOM.createRoot(document.getElementById('root')).render(<InstApp/>);
</script>

</body>
</html>
