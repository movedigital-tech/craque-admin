<script type="text/babel">
function EscLineChart({data, height=240}) {
  const W=640, p={l:42,r:16,t:18,b:30};
  const iw=W-p.l-p.r, ih=height-p.t-p.b;
  const all=[...data.recebido,...data.previsto], mx=Math.ceil(Math.max(...all)/5)*5, n=data.recebido.length;
  const gx=i=>p.l+iw*i/(n-1), gy=v=>p.t+ih-ih*v/mx;
  const spline=vs=>{const pts=vs.map((v,i)=>[gx(i),gy(v)]);let d=`M ${pts[0][0]} ${pts[0][1]}`;for(let i=0;i<n-1;i++){const a=pts[i-1]||pts[i],b=pts[i],c=pts[i+1],e=pts[i+2]||c;d+=` C ${b[0]+(c[0]-a[0])/6} ${b[1]+(c[1]-a[1])/6} ${c[0]-(e[0]-b[0])/6} ${c[1]-(e[1]-b[1])/6} ${c[0]} ${c[1]}`;}return {d,pts};};
  const rec=spline(data.recebido), prev=spline(data.previsto);
  const area=rec.d+` L ${rec.pts[n-1][0]} ${p.t+ih} L ${p.l} ${p.t+ih} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${height}`} width="100%" style={{display:'block'}}>
      <defs><linearGradient id="ecRecGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#C8EE44" stopOpacity="0.22"/><stop offset="100%" stopColor="#C8EE44" stopOpacity="0"/>
      </linearGradient></defs>
      {[0,.25,.5,.75,1].map((f,i)=>{const t=Math.round(mx*f);return(<g key={i}>
        <line x1={p.l} x2={W-p.r} y1={gy(t)} y2={gy(t)} stroke="var(--chart-grid)" strokeWidth="1" strokeDasharray="2 5"/>
        <text x={p.l-8} y={gy(t)+4} textAnchor="end" fontFamily="var(--font-ui)" fontSize="11" fill="var(--chart-axis)">{t}k</text>
      </g>);})}
      {data.labels.map((lb,i)=>(<text key={lb} x={gx(i)} y={height-6} textAnchor="middle" fontFamily="var(--font-ui)" fontSize="11" fill="var(--chart-axis)">{lb}</text>))}
      <path d={area} fill="url(#ecRecGrad)"/>
      <path d={prev.d} fill="none" stroke="var(--gray-300)" strokeWidth="2" strokeDasharray="5 5" strokeLinecap="round"/>
      <path d={rec.d} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round"/>
      <circle cx={rec.pts[n-1][0]} cy={rec.pts[n-1][1]} r="5" fill="var(--accent)" stroke="white" strokeWidth="2.5"/>
    </svg>
  );
}
window.EscLineChart=EscLineChart;

function EscBarChart({data, height=240}) {
  const W=640, p={l:42,r:16,t:18,b:30};
  const iw=W-p.l-p.r, ih=height-p.t-p.b;
  const mx=Math.ceil(Math.max(...data.vals)/5)*5, n=data.vals.length;
  const bw=iw/n*0.55, gap=iw/n;
  return (
    <svg viewBox={`0 0 ${W} ${height}`} width="100%" style={{display:'block'}}>
      {[0,.25,.5,.75,1].map((f,i)=>{const t=Math.round(mx*f),y=p.t+ih-ih*f;return(<g key={i}>
        <line x1={p.l} x2={W-p.r} y1={y} y2={y} stroke="var(--chart-grid)" strokeWidth="1" strokeDasharray="2 5"/>
        <text x={p.l-8} y={y+4} textAnchor="end" fontFamily="var(--font-ui)" fontSize="11" fill="var(--chart-axis)">{t}k</text>
      </g>);})}
      {data.vals.map((v,i)=>{const h=ih*v/mx,x=p.l+gap*i+(gap-bw)/2,y=p.t+ih-h,last=i===n-1;return(
        <rect key={i} x={x} y={y} width={bw} height={h} rx="4" fill={last?'var(--accent)':'var(--surface-muted)'}/>
      );})}
      {data.labels.map((lb,i)=>(<text key={lb} x={p.l+gap*i+gap/2} y={height-6} textAnchor="middle" fontFamily="var(--font-ui)" fontSize="11" fill="var(--chart-axis)">{lb}</text>))}
    </svg>
  );
}
window.EscBarChart=EscBarChart;
</script>

          </Card>
          <Card padding={0} style={{overflow:'hidden'}}>
            <div style={{padding:'24px 24px 14px'}}><h3 style={{margin:0,fontSize:'var(--fs-h4)',fontWeight:'var(--fw-bold)',fontFamily:'var(--font-ui)'}}>Split por membro</h3></div>

                <tr key={i}>

                  <td style={{...TD,fontWeight:'var(--fw-bold)',fontVariantNumeric:'tabular-nums'}}>{r[2]}</td>
                  <td style={{...TD,textAlign:'right'}}><Button variant="ghost" size="sm">{r[3]}</Button></td>
                </tr>))}</tbody>
            </table>
            <div style={{height:8}}/>
          </Card>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <InfoNote>Split é calculado na <strong>criação da cobrança</strong> e registrado por transação. Mudanças não afetam cobranças já geradas.</InfoNote>
          <Button variant="primary" size="md" fullWidth leadingIcon="check">Salvar split</Button>
        </div>
      </div>}
    </div>
  );
}
window.EscConfig=EscConfig;
</script>
