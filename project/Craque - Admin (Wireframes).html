<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Craque — Admin · Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --paper:#F4F2EC; --card:#FBFAF6; --ink:#2A2926; --ink2:#6F6D66; --ink3:#9A988F;
    --line:#CBC8BE; --line-strong:#A8A59B; --fill:#E9E6DD; --fill2:#F0EEE6;
    --accent:#1E9E5A; --accent-ink:#0F6B3B; --accent-tint:#D9F0E1;
    --note:#FCE9A6; --note-ink:#7A5C12; --danger:#D6694F; --warn:#E0A53C; --info:#5E84C4;
    --radius:12px; --radius-sm:8px; --sidebar:248px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:'Kalam',cursive; background:var(--paper); color:var(--ink);
    font-size:16px; line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  #app{height:100vh}
  button{font-family:inherit}
  a{color:inherit}
  ::selection{background:var(--note)}

  /* ---------- shell ---------- */
  .wf-shell{display:flex;height:100vh;overflow:hidden}
  .wf-side{
    width:var(--sidebar);flex:none;background:var(--card);
    border-right:2px solid var(--line);padding:22px 16px;display:flex;flex-direction:column;gap:22px;overflow-y:auto;
  }
  .wf-brand{display:flex;align-items:center;gap:11px;padding:2px 6px 6px}
  .wf-logo{width:38px;height:38px;border-radius:11px;background:var(--ink);color:var(--accent);
    display:grid;place-items:center;border:2px solid var(--ink);position:relative;flex:none}
  .wf-logo i{width:20px;height:20px}
  .wf-brand-name{font-weight:700;font-size:22px;letter-spacing:.3px;line-height:1}
  .wf-brand-sub{font-size:12px;color:var(--ink3);line-height:1}
  .wf-navgroup{display:flex;flex-direction:column;gap:3px}
  .wf-navlabel{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);
    padding:8px 12px 4px;font-weight:700}
  .wf-navitem{display:flex;align-items:center;gap:12px;width:100%;border:none;background:transparent;
    text-align:left;cursor:pointer;padding:9px 12px;border-radius:var(--radius-sm);color:var(--ink2);
    font-size:15px;font-weight:400}
  .wf-navitem i{width:19px;height:19px;flex:none;color:var(--ink3)}
  .wf-navitem:hover{background:var(--fill2)}
  .wf-navitem.active{background:var(--ink);color:#fff;font-weight:700;border:2px dashed var(--accent)}
  .wf-navitem.active i{color:var(--accent)}
  .wf-navfoot{margin-top:auto;border-top:2px dashed var(--line);padding-top:12px;display:flex;flex-direction:column;gap:3px}

  .wf-main{flex:1;overflow-y:auto;padding:26px 34px 60px}
  .wf-topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:24px}
  .wf-title{font-size:30px;font-weight:700;line-height:1.1;margin:0}
  .wf-subtitle{color:var(--ink2);font-size:15px;margin:5px 0 0}
  .wf-topright{display:flex;align-items:center;gap:12px;flex:none}
  .wf-search{display:flex;align-items:center;gap:9px;height:44px;padding:0 14px;background:var(--card);
    border:2px solid var(--line);border-radius:var(--radius-sm);width:230px;color:var(--ink3)}
  .wf-search i{width:18px;height:18px}
  .wf-iconbtn{width:44px;height:44px;display:grid;place-items:center;background:var(--card);
    border:2px solid var(--line);border-radius:var(--radius-sm);cursor:pointer;color:var(--ink2);position:relative}
  .wf-iconbtn i{width:19px;height:19px}
  .wf-dot{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--danger);border:1.5px solid var(--card)}
  .wf-account{display:flex;align-items:center;gap:10px;height:44px;padding:0 12px 0 6px;background:var(--card);
    border:2px solid var(--line);border-radius:999px;cursor:pointer}

  /* ---------- primitives ---------- */
  .wf-card{background:var(--card);border:2px solid var(--line);border-radius:var(--radius);padding:20px 22px}
  .wf-card.tight{padding:16px 18px}
  .wf-card-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px}
  .wf-card-title{font-size:18px;font-weight:700;margin:0}
  .wf-card-sub{font-size:13px;color:var(--ink2);margin:2px 0 0}
  .wf-grid{display:grid;gap:18px}
  .wf-row{display:flex;gap:18px}
  .wf-spread{display:flex;align-items:center;justify-content:space-between;gap:14px}

  .wf-line{height:11px;background:var(--fill);border-radius:6px;display:block}
  .wf-line.dark{background:var(--line-strong)}
  .wf-line.sm{height:9px}
  .wf-stack{display:flex;flex-direction:column;gap:8px}

  .wf-btn{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 18px;border-radius:var(--radius-sm);
    border:2px solid var(--ink);background:var(--card);color:var(--ink);font-size:15px;font-weight:700;cursor:pointer;
    box-shadow:2px 2px 0 var(--line)}
  .wf-btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--line)}
  .wf-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--line)}
  .wf-btn i{width:17px;height:17px}
  .wf-btn.primary{background:var(--accent);border-color:var(--accent-ink);color:#fff;box-shadow:2px 2px 0 var(--accent-ink)}
  .wf-btn.sm{height:36px;padding:0 13px;font-size:14px}
  .wf-btn.ghost{box-shadow:none;border-color:var(--line);color:var(--ink2);font-weight:400}
  .wf-btn.block{width:100%;justify-content:center}

  .wf-chip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border-radius:999px;
    border:2px solid var(--line);background:var(--card);font-size:13px;color:var(--ink2);cursor:pointer}
  .wf-chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wf-chips{display:flex;flex-wrap:wrap;gap:8px}

  .wf-badge{display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 11px;border-radius:999px;
    font-size:13px;font-weight:700;border:2px solid var(--line);background:var(--fill2);color:var(--ink2)}
  .wf-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
  .wf-badge.bare::before{display:none}
  .wf-badge.ok{color:var(--accent-ink);background:var(--accent-tint);border-color:#A9D9BC}
  .wf-badge.warn{color:var(--note-ink);background:#FBEFC4;border-color:#E8D695}
  .wf-badge.bad{color:#9A3B26;background:#F4D9D0;border-color:#E0B5A8}
  .wf-badge.info{color:#2F4E86;background:#DCE6F6;border-color:#B3C7E6}
  .wf-badge.mut{color:var(--ink2)}

  .wf-av{width:36px;height:36px;border-radius:50%;background:var(--fill);border:2px solid var(--line);
    display:inline-grid;place-items:center;font-size:13px;font-weight:700;color:var(--ink2);flex:none}

  table.wf-table{width:100%;border-collapse:collapse}
  .wf-table th{text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);
    font-weight:700;padding:10px 12px;border-bottom:2px solid var(--line)}
  .wf-table td{padding:13px 12px;border-bottom:1.5px dashed var(--line);font-size:14px;vertical-align:middle}
  .wf-table tr:last-child td{border-bottom:none}
  .wf-table tr.click:hover td{background:var(--fill2);cursor:pointer}
  .wf-cellmain{display:flex;align-items:center;gap:11px}
  .wf-cellname{font-weight:700;font-size:15px}
  .wf-cellsub{font-size:12px;color:var(--ink3)}
  .wf-num{font-variant-numeric:tabular-nums;font-weight:700}

  .wf-stat{background:var(--card);border:2px solid var(--line);border-radius:var(--radius);padding:18px}
  .wf-stat.dark{background:var(--ink);border-color:var(--ink);color:#fff}
  .wf-stat-ico{width:38px;height:38px;border-radius:10px;background:var(--fill);display:grid;place-items:center;margin-bottom:14px}
  .wf-stat.dark .wf-stat-ico{background:rgba(255,255,255,.12)}
  .wf-stat-ico i{width:19px;height:19px;color:var(--ink2)}
  .wf-stat.dark .wf-stat-ico i{color:var(--accent)}
  .wf-stat-label{font-size:13px;color:var(--ink2)}
  .wf-stat.dark .wf-stat-label{color:rgba(255,255,255,.7)}
  .wf-stat-value{font-size:27px;font-weight:700;margin-top:3px;line-height:1.1;font-variant-numeric:tabular-nums}
  .wf-stat-trend{font-size:13px;font-weight:700;margin-top:5px;color:var(--accent-ink)}
  .wf-stat-trend.down{color:var(--danger)}

  .wf-field{display:flex;flex-direction:column;gap:6px}
  .wf-field>span{font-size:13px;font-weight:700;color:var(--ink2)}
  .wf-input{min-height:44px;display:flex;align-items:center;padding:0 13px;background:var(--card);
    border:2px solid var(--line);border-radius:var(--radius-sm);color:var(--ink3);font-size:14px}
  .wf-input.area{min-height:84px;align-items:flex-start;padding-top:11px}
  .wf-input .ph{color:var(--ink3)}
  .wf-input.sel{justify-content:space-between}
  .wf-input.sel i{width:17px;height:17px}

  .wf-ph{border:2px dashed var(--line-strong);border-radius:var(--radius-sm);
    background:repeating-linear-gradient(135deg,transparent,transparent 9px,var(--fill2) 9px,var(--fill2) 18px);
    display:grid;place-items:center;color:var(--ink3);font-size:13px;text-align:center;padding:14px}

  .wf-toggle{width:48px;height:28px;border-radius:999px;border:2px solid var(--line);background:var(--fill);position:relative;flex:none}
  .wf-toggle.on{background:var(--accent-tint);border-color:#A9D9BC}
  .wf-toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--card);border:2px solid var(--line)}
  .wf-toggle.on::after{left:auto;right:2px;border-color:var(--accent-ink)}

  .wf-note{position:relative;background:var(--note);border:2px solid #E8D695;border-radius:4px;padding:11px 14px;
    font-size:13.5px;color:var(--note-ink);box-shadow:2px 3px 0 rgba(0,0,0,.06);transform:rotate(-.7deg)}
  .wf-note b{font-weight:700}
  .wf-note i{width:15px;height:15px;vertical-align:-2px;margin-right:5px}

  .wf-divider{height:0;border-top:1.5px dashed var(--line);margin:18px 0}
  .wf-tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:16px}
  .wf-tab{padding:9px 14px;font-size:14px;color:var(--ink2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-weight:400}
  .wf-tab.on{color:var(--ink);font-weight:700;border-bottom-color:var(--accent)}

  .wf-breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink3);margin-bottom:6px}
  .wf-breadcrumb i{width:14px;height:14px}

  .wf-stamp{position:fixed;right:16px;bottom:14px;z-index:50;background:var(--note);border:2px solid #E8D695;
    color:var(--note-ink);font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;transform:rotate(-2deg);
    box-shadow:2px 3px 0 rgba(0,0,0,.07);pointer-events:none}

  /* sketch chart */
  .wf-chart{width:100%;height:200px;display:block}
  .wf-chart path.area{fill:var(--accent-tint);opacity:.5}
  .wf-chart path.l1{fill:none;stroke:var(--accent-ink);stroke-width:2.5;stroke-linecap:round;stroke-dasharray:0}
  .wf-chart path.l2{fill:none;stroke:var(--line-strong);stroke-width:2.5;stroke-dasharray:5 5;stroke-linecap:round}
  .wf-chart line{stroke:var(--line);stroke-width:1.5;stroke-dasharray:3 4}
  .wf-bars{display:flex;align-items:flex-end;gap:10px;height:170px;padding-top:10px}
  .wf-bar{flex:1;background:var(--fill);border:2px solid var(--line);border-bottom:none;border-radius:6px 6px 0 0}
  .wf-bar.hi{background:var(--accent-tint);border-color:#A9D9BC}

  /* login */
  .wf-login{height:100vh;display:grid;grid-template-columns:1.05fr 1fr}
  .wf-login-brand{background:var(--ink);color:#fff;padding:54px 56px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .wf-login-brand .blob{position:absolute;border-radius:50%;border:2px dashed rgba(255,255,255,.18)}
  .wf-login-form{display:grid;place-items:center;padding:40px}
  .wf-login-inner{width:100%;max-width:380px;display:flex;flex-direction:column;gap:18px}
  .wf-check{width:22px;height:22px;border:2px solid var(--line);border-radius:6px;flex:none}
</style>
</head>
<body>
<div id="app"></div>
<div class="wf-stamp">✎ Wireframe lo-fi · estrutura p/ validação</div>

<script src="wireframes/admin-screens.js"></script>
<script>
  const app = document.getElementById('app');
  const state = { screen: 'dashboard', loggedIn: false };

  const NAV = [
    { group:'Visão geral', items:[ {k:'dashboard', label:'Dashboard', icon:'layout-dashboard'} ] },
    { group:'Clientes', items:[
      {k:'escolinhas', label:'Escolinhas', icon:'building-2'},
      {k:'escolinha-cadastro', label:'Nova escolinha', icon:'plus-circle'},
    ]},
    { group:'SaaS', items:[
      {k:'planos', label:'Planos SaaS', icon:'layers'},
      {k:'assinaturas', label:'Assinaturas', icon:'repeat'},
      {k:'cobrancas', label:'Cobranças SaaS', icon:'receipt'},
    ]},
    { group:'Financeiro', items:[
      {k:'financeiro', label:'Financeiro', icon:'wallet'},
      {k:'gateway', label:'Gateway & Split', icon:'split'},
      {k:'kyc', label:'Subcontas / KYC', icon:'shield-check'},
      {k:'relatorios', label:'Relatórios', icon:'bar-chart-3'},
    ]},
    { group:'Sistema', items:[
      {k:'usuarios', label:'Usuários & Perfis', icon:'users'},
      {k:'config', label:'Configurações', icon:'settings'},
    ]},
  ];

  function sidebar(){
    const groups = NAV.map(g => `
      <div class="wf-navgroup">
        <div class="wf-navlabel">${g.group}</div>
        ${g.items.map(it => `
          <button class="wf-navitem ${state.screen===it.k?'active':''}" data-nav="${it.k}">
            <i data-lucide="${it.icon}"></i>${it.label}
          </button>`).join('')}
      </div>`).join('');
    return `
      <aside class="wf-side">
        <div class="wf-brand">
          <span class="wf-logo"><i data-lucide="trophy"></i></span>
          <div>
            <div class="wf-brand-name">Craque</div>
            <div class="wf-brand-sub">Admin da plataforma</div>
          </div>
        </div>
        ${groups}
        <div class="wf-navfoot">
          <button class="wf-navitem" data-go="login"><i data-lucide="log-out"></i>Sair</button>
        </div>
      </aside>`;
  }

  function topbar(meta){
    return `
      <div class="wf-topbar">
        <div>
          <h1 class="wf-title">${meta.title}</h1>
          ${meta.subtitle?`<p class="wf-subtitle">${meta.subtitle}</p>`:''}
        </div>
        <div class="wf-topright">
          <div class="wf-search"><i data-lucide="search"></i>Buscar escolinha, transação…</div>
          <button class="wf-iconbtn"><i data-lucide="bell"></i><span class="wf-dot"></span></button>
          <div class="wf-account"><span class="wf-av">RA</span><i data-lucide="chevron-down" style="width:16px;height:16px;color:var(--ink3)"></i></div>
        </div>
      </div>`;
  }

  function draw(){
    if(!state.loggedIn){
      app.innerHTML = ADMIN_SCREENS.login.html;
    } else {
      const meta = ADMIN_SCREENS[state.screen] || ADMIN_SCREENS.dashboard;
      app.innerHTML = `
        <div class="wf-shell">
          ${sidebar()}
          <main class="wf-main">
            ${topbar(meta)}
            ${meta.html}
          </main>
        </div>`;
    }
    bind();
    if(window.lucide) lucide.createIcons({attrs:{'stroke-width':1.6}});
    const m = app.querySelector('.wf-main'); if(m) m.scrollTop = 0;
  }

  function bind(){
    app.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{
      state.screen = el.getAttribute('data-nav'); state.loggedIn = true; draw();
    }));
    app.querySelectorAll('[data-go]').forEach(el=>el.addEventListener('click',()=>{
      const g = el.getAttribute('data-go');
      if(g==='login'){ state.loggedIn=false; }
      else { state.screen=g; state.loggedIn=true; }
      draw();
    }));
  }

  draw();
</script>
</body>
</html>
